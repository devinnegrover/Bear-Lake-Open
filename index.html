<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bear Lake Open - Minimal Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f4f0; }
    .status { padding: 20px; margin: 20px 0; background: white; border-radius: 8px; font-size: 16px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>⛳ Bear Lake Open - Minimal Test</h1>
  <div id="status" class="status">Loading Supabase client...</div>

  <script>
    const statusEl = document.getElementById('status');

    statusEl.textContent = 'Supabase script loaded. Creating client...';

    try {
      const supabase = Supabase.createClient(
        'https://duchhofwmsmlmuvywsyk.supabase.co',
        'sb_publishable_Nrlevsr9FJCfiD-viBqcuA__Hv_p7BZ'
      );

      statusEl.textContent = 'Client created. Testing query to golf_rounds...';

      supabase
        .from('golf_rounds')
        .select('*')
        .eq('room_id', 'bearlake-open-main')
        .then(({ data, error }) => {
          if (error) {
            statusEl.textContent = `Query Error:\n${error.message}`;
          } else {
            statusEl.textContent = `Success! Row exists: ${data ? 'Yes' : 'No'}\nData: ${JSON.stringify(data, null, 2)}`;
          }
        });

    } catch (err) {
      statusEl.textContent = `Failed to create client:\n${err.message}`;
    }
  </script>
</body>
</html>
